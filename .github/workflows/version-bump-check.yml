name: version-bump-check

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect PR labels
        id: labels
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          # Convert JSON array of label names to newline-separated string,
          # then export to GITHUB_ENV using a multiline-safe heredoc.
          python3 - <<'PY' >> "$GITHUB_ENV"
          import json, os
          names = json.loads(os.environ["LABELS_JSON"])
          print("PR_LABELS<<__EOF__")
          for n in names:
              print(n)
          print("__EOF__")
          PY

      - name: Run version-bump-check
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          git fetch origin "${{ github.base_ref }}" || true
          ./scripts/version-bump-check.sh
