    <circle cx="450" cy="90" r="1" fill="#d9f99d"/>
    <circle cx="750" cy="95" r="1.2" fill="#d9f99d"/>
    <circle cx="350" cy="310" r="0.8" fill="#d9f99d"/>
    <circle cx="650" cy="300" r="1" fill="#d9f99d"/>
    <circle cx="850" cy="310" r="0.8" fill="#d9f99d"/>
    <circle cx="550" cy="85" r="0.8" fill="#d9f99d"/>
    <circle cx="950" cy="95" r="0.7" fill="#d9f99d"/>
    <circle cx="250" cy="95" r="0.7" fill="#d9f99d"/>
    <circle cx="480" cy="305" r="0.9" fill="#d9f99d"/>
    <circle cx="720" cy="305" r="0.7" fill="#d9f99d"/>
  </g>

  <!-- Side accent bars -->
  <rect x="18" y="60" width="2" height="280" fill="url(#lineGradV)" opacity="0.15" rx="1"/>
  <rect x="24" y="100" width="1" height="200" fill="url(#lineGradV)" opacity="0.08" rx="0.5"/>
  <rect x="1180" y="60" width="2" height="280" fill="url(#lineGradV)" opacity="0.15" rx="1"/>
  <rect x="1175" y="100" width="1" height="200" fill="url(#lineGradV)" opacity="0.08" rx="0.5"/>
  <polygon points="19,60 22,55 25,60 22,65" fill="#a3e635" opacity="0.3"/>
  <polygon points="19,340 22,335 25,340 22,345" fill="#a3e635" opacity="0.3"/>
  <polygon points="1177,60 1180,55 1183,60 1180,65" fill="#a3e635" opacity="0.3"/>
