<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d1a0d" />
      <stop offset="100%" stop-color="#050808" />
    </radialGradient>
    <linearGradient id="lineGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#a3e635" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9f99d" />
      <stop offset="50%" stop-color="#a3e635" />
      <stop offset="100%" stop-color="#65a30d" />
    </linearGradient>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.15" />
      <stop offset="40%" stop-color="#84cc16" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0" />
    </radialGradient>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#a3e635" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <pattern id="hexGrid" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,2 55,15 55,37 30,50 5,37 5,15" fill="none" stroke="#a3e635" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.64  0 0 0 0 0.8  0 0 0 0 0.09  0 0 0 1 0" result="green"/>
      <feMerge>
        <feMergeNode in="green"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="titleNeon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur2"/>
      <feColorMatrix in="blur1" type="matrix" values="0 0 0 0 0.64  0 0 0 0 0.8  0 0 0 0 0.09  0 0 0 0.5 0" result="green1"/>
      <feColorMatrix in="blur2" type="matrix" values="0 0 0 0 0.64  0 0 0 0 0.8  0 0 0 0 0.09  0 0 0 0.8 0" result="green2"/>
      <feMerge>
        <feMergeNode in="green1"/>
        <feMergeNode in="green2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlowFilter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.64  0 0 0 0 0.8  0 0 0 0 0.09  0 0 0 0.6 0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGlow)" rx="8"/>
  <rect width="1200" height="400" fill="url(#hexGrid)" rx="8" opacity="0.8"/>
  <rect width="1200" height="400" fill="url(#scanlines)" rx="8"/>

  <!-- Border frame -->
  <rect x="2" y="2" width="1196" height="396" rx="8" fill="none" stroke="#a3e635" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="2" y1="30" x2="2" y2="2" stroke="#a3e635" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="2" y1="2" x2="30" y2="2" stroke="#a3e635" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="1170" y1="2" x2="1198" y2="2" stroke="#a3e635" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="1198" y1="2" x2="1198" y2="30" stroke="#a3e635" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="2" y1="370" x2="2" y2="398" stroke="#a3e635" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="2" y1="398" x2="30" y2="398" stroke="#a3e635" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="1170" y1="398" x2="1198" y2="398" stroke="#a3e635" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="1198" y1="370" x2="1198" y2="398" stroke="#a3e635" stroke-opacity="0.5" stroke-width="2"/>

  <!-- Central hub glow -->
  <ellipse cx="600" cy="185" rx="250" ry="120" fill="url(#hubGlow)"/>

  <!-- Neural network connections -->
  <g opacity="0.4">
    <line x1="120" y1="200" x2="280" y2="160" stroke="#84cc16" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="120" y1="200" x2="280" y2="240" stroke="#84cc16" stroke-opacity="0.2" stroke-width="0.8"/>
    <line x1="180" y1="100" x2="280" y2="160" stroke="#84cc16" stroke-opacity="0.25" stroke-width="0.8"/>
    <line x1="180" y1="100" x2="380" y2="120" stroke="#84cc16" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="100" y1="320" x2="280" y2="240" stroke="#84cc16" stroke-opacity="0.2" stroke-width="0.8"/>
    <line x1="280" y1="160" x2="380" y2="120" stroke="#84cc16" stroke-opacity="0.35" stroke-width="1.2"/>
    <line x1="280" y1="240" x2="380" y2="260" stroke="#84cc16" stroke-opacity="0.35" stroke-width="1.2"/>
    <line x1="280" y1="160" x2="380" y2="260" stroke="#84cc16" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="380" y1="120" x2="520" y2="160" stroke="#a3e635" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="380" y1="260" x2="520" y2="220" stroke="#a3e635" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="380" y1="120" x2="520" y2="220" stroke="#84cc16" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="520" y1="160" x2="680" y2="160" stroke="#a3e635" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="520" y1="220" x2="680" y2="220" stroke="#a3e635" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="520" y1="160" x2="680" y2="220" stroke="#84cc16" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="520" y1="220" x2="680" y2="160" stroke="#84cc16" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="680" y1="160" x2="820" y2="120" stroke="#a3e635" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="680" y1="220" x2="820" y2="260" stroke="#a3e635" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="680" y1="160" x2="820" y2="260" stroke="#84cc16" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="820" y1="120" x2="920" y2="160" stroke="#84cc16" stroke-opacity="0.35" stroke-width="1.2"/>
    <line x1="820" y1="260" x2="920" y2="240" stroke="#84cc16" stroke-opacity="0.35" stroke-width="1.2"/>
    <line x1="920" y1="160" x2="1080" y2="200" stroke="#84cc16" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="920" y1="240" x2="1080" y2="200" stroke="#84cc16" stroke-opacity="0.2" stroke-width="0.8"/>
    <line x1="1020" y1="100" x2="920" y2="160" stroke="#84cc16" stroke-opacity="0.25" stroke-width="0.8"/>
    <line x1="1100" y1="320" x2="920" y2="240" stroke="#84cc16" stroke-opacity="0.2" stroke-width="0.8"/>
    <line x1="1020" y1="100" x2="820" y2="120" stroke="#84cc16" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="180" y1="100" x2="120" y2="200" stroke="#84cc16" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="100" y1="320" x2="200" y2="330" stroke="#84cc16" stroke-opacity="0.1" stroke-width="0.5"/>
    <line x1="200" y1="330" x2="380" y2="260" stroke="#84cc16" stroke-opacity="0.1" stroke-width="0.5"/>
    <line x1="1000" y1="330" x2="1100" y2="320" stroke="#84cc16" stroke-opacity="0.1" stroke-width="0.5"/>
    <line x1="820" y1="260" x2="1000" y2="330" stroke="#84cc16" stroke-opacity="0.1" stroke-width="0.5"/>
    <line x1="1020" y1="100" x2="1080" y2="200" stroke="#84cc16" stroke-opacity="0.12" stroke-width="0.5"/>
  </g>

  <!-- Outer nodes -->
  <g filter="url(#nodeGlowFilter)">
    <circle cx="120" cy="200" r="3" fill="#84cc16" opacity="0.6"/>
    <circle cx="180" cy="100" r="2.5" fill="#84cc16" opacity="0.4"/>
    <circle cx="100" cy="320" r="2" fill="#84cc16" opacity="0.35"/>
    <circle cx="200" cy="330" r="1.5" fill="#84cc16" opacity="0.25"/>
    <circle cx="1080" cy="200" r="3" fill="#84cc16" opacity="0.6"/>
    <circle cx="1020" cy="100" r="2.5" fill="#84cc16" opacity="0.4"/>
    <circle cx="1100" cy="320" r="2" fill="#84cc16" opacity="0.35"/>
    <circle cx="1000" cy="330" r="1.5" fill="#84cc16" opacity="0.25"/>
  </g>

