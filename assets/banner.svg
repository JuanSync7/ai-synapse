    <circle cx="280" cy="160" r="4" fill="#a3e635" opacity="0.7"/>
    <circle cx="280" cy="240" r="4" fill="#a3e635" opacity="0.7"/>
    <circle cx="920" cy="160" r="4" fill="#a3e635" opacity="0.7"/>
    <circle cx="920" cy="240" r="4" fill="#a3e635" opacity="0.7"/>
  </g>

  <!-- Pipeline nodes -->
  <g filter="url(#neonGlow)">
    <circle cx="380" cy="120" r="6" fill="#0a0a0f" stroke="#a3e635" stroke-width="1.5"/>
    <circle cx="380" cy="120" r="2.5" fill="#a3e635"/>
  </g>
  <g filter="url(#neonGlow)">
    <circle cx="380" cy="260" r="6" fill="#0a0a0f" stroke="#a3e635" stroke-width="1.5"/>
    <circle cx="380" cy="260" r="2.5" fill="#a3e635"/>
  </g>
  <g filter="url(#neonGlow)">
    <circle cx="520" cy="160" r="6" fill="#0a0a0f" stroke="#a3e635" stroke-width="1.5"/>
    <circle cx="520" cy="160" r="2.5" fill="#a3e635"/>
  </g>
  <g filter="url(#neonGlow)">
    <circle cx="520" cy="220" r="6" fill="#0a0a0f" stroke="#a3e635" stroke-width="1.5"/>
    <circle cx="520" cy="220" r="2.5" fill="#a3e635"/>
  </g>
  <g filter="url(#neonGlow)">
    <circle cx="680" cy="160" r="6" fill="#0a0a0f" stroke="#a3e635" stroke-width="1.5"/>
    <circle cx="680" cy="160" r="2.5" fill="#a3e635"/>
  </g>
  <g filter="url(#neonGlow)">
    <circle cx="680" cy="220" r="6" fill="#0a0a0f" stroke="#a3e635" stroke-width="1.5"/>
    <circle cx="680" cy="220" r="2.5" fill="#a3e635"/>
  </g>
  <g filter="url(#neonGlow)">
    <circle cx="820" cy="120" r="6" fill="#0a0a0f" stroke="#a3e635" stroke-width="1.5"/>
    <circle cx="820" cy="120" r="2.5" fill="#a3e635"/>
  </g>
  <g filter="url(#neonGlow)">
    <circle cx="820" cy="260" r="6" fill="#0a0a0f" stroke="#a3e635" stroke-width="1.5"/>
    <circle cx="820" cy="260" r="2.5" fill="#a3e635"/>
  </g>

  <!-- Skill-type icons -->
  <g transform="translate(155, 280)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="none" stroke="#a3e635" stroke-width="0.8"/>
    <line x1="-8" y1="0" x2="-8" y2="10" stroke="#a3e635" stroke-width="0.8"/>
    <line x1="8" y1="0" x2="8" y2="10" stroke="#a3e635" stroke-width="0.8"/>
    <ellipse cx="0" cy="10" rx="8" ry="3" fill="none" stroke="#a3e635" stroke-width="0.8"/>
  </g>
  <g transform="translate(1040, 280)" opacity="0.5">
    <rect x="-6" y="-8" width="12" height="16" fill="none" stroke="#a3e635" stroke-width="0.8" rx="1"/>
    <line x1="-3" y1="-3" x2="3" y2="-3" stroke="#a3e635" stroke-width="0.6"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#a3e635" stroke-width="0.6"/>
    <line x1="-3" y1="3" x2="1" y2="3" stroke="#a3e635" stroke-width="0.6"/>
  </g>
  <g transform="translate(70, 130)" opacity="0.4">
    <rect x="-8" y="-10" width="16" height="7" fill="none" stroke="#84cc16" stroke-width="0.7" rx="1"/>
    <rect x="-8" y="-1" width="16" height="7" fill="none" stroke="#84cc16" stroke-width="0.7" rx="1"/>
    <circle cx="4" cy="-6.5" r="1.2" fill="#84cc16" opacity="0.6"/>
    <circle cx="4" cy="2.5" r="1.2" fill="#84cc16" opacity="0.6"/>
  </g>
  <g transform="translate(1130, 130)" opacity="0.4">
    <text x="0" y="0" fill="#84cc16" font-family="monospace" font-size="16" text-anchor="middle" dominant-baseline="central">&lt;/&gt;</text>
  </g>
  <g transform="translate(320, 340)" opacity="0.35">
    <circle cx="0" cy="0" r="9" fill="none" stroke="#84cc16" stroke-width="0.7"/>
    <path d="M-4,-4 Q0,-8 4,-4 M-5,0 Q0,4 5,0 M-3,4 Q0,2 3,4" fill="none" stroke="#84cc16" stroke-width="0.6"/>
  </g>
  <g transform="translate(880, 340)" opacity="0.35">
    <circle cx="0" cy="0" r="4" fill="none" stroke="#84cc16" stroke-width="0.7"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#84cc16" stroke-width="0.5" stroke-dasharray="3,3"/>
  </g>

  <!-- Cyberpunk HUD text -->
  <g opacity="0.25">
    <text x="50" y="25" fill="#a3e635" font-family="monospace" font-size="8" opacity="0.4">0x7F3A :: SYNAPSE_CORE</text>
    <text x="900" y="25" fill="#a3e635" font-family="monospace" font-size="8" opacity="0.4">SKILL_REGISTRY v4.2.1</text>
  </g>
  <g opacity="0.25">
    <text x="50" y="388" fill="#a3e635" font-family="monospace" font-size="8" opacity="0.4">PIPELINE::ACTIVE</text>
    <text x="880" y="388" fill="#a3e635" font-family="monospace" font-size="8" opacity="0.4">NODES: 24 :: CONNECTIONS: 47</text>
  </g>

  <!-- Decorative lines -->
  <line x1="40" y1="38" x2="300" y2="38" stroke="#a3e635" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="900" y1="38" x2="1160" y2="38" stroke="#a3e635" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="40" y1="375" x2="300" y2="375" stroke="#a3e635" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="900" y1="375" x2="1160" y2="375" stroke="#a3e635" stroke-opacity="0.08" stroke-width="0.5"/>
  <g stroke="#a3e635" stroke-opacity="0.15" stroke-width="0.5">
    <line x1="40" y1="35" x2="40" y2="41"/>
    <line x1="100" y1="36" x2="100" y2="40"/>
    <line x1="160" y1="35" x2="160" y2="41"/>
    <line x1="220" y1="36" x2="220" y2="40"/>
    <line x1="300" y1="35" x2="300" y2="41"/>
    <line x1="1160" y1="35" x2="1160" y2="41"/>
    <line x1="1100" y1="36" x2="1100" y2="40"/>
    <line x1="1040" y1="35" x2="1040" y2="41"/>
    <line x1="980" y1="36" x2="980" y2="40"/>
    <line x1="900" y1="35" x2="900" y2="41"/>
  </g>

  <!-- Hexagonal title frame -->
