  <polygon points="600,135 715,158 715,212 600,235 485,212 485,158" fill="#0a0a0f" fill-opacity="0.7" stroke="#a3e635" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- Title -->
  <g filter="url(#titleNeon)">
    <text x="600" y="178" fill="url(#titleGrad)" font-family="'Courier New', 'Fira Code', monospace" font-size="42" font-weight="bold" text-anchor="middle" dominant-baseline="central" letter-spacing="6">AI-SYNAPSE</text>
  </g>
  <text x="600" y="208" fill="#a3e635" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" dominant-baseline="central" letter-spacing="8" opacity="0.6">SKILL ORCHESTRATION FRAMEWORK</text>

  <!-- Title flanking lines -->
  <line x1="430" y1="185" x2="485" y2="185" stroke="#a3e635" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="715" y1="185" x2="770" y2="185" stroke="#a3e635" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="430" cy="185" r="2" fill="#a3e635" opacity="0.4"/>
  <circle cx="770" cy="185" r="2" fill="#a3e635" opacity="0.4"/>

  <!-- Pipeline labels -->
  <g font-family="'Courier New', monospace" font-size="7" fill="#a3e635" opacity="0.45" text-anchor="middle">
    <text x="380" y="100">SCOPE</text>
    <text x="380" y="282">DESIGN</text>
    <text x="520" y="145">SPEC</text>
    <text x="520" y="242">IMPL</text>
    <text x="680" y="145">GUIDE</text>
    <text x="680" y="242">TEST</text>
    <text x="820" y="100">BUILD</text>
    <text x="820" y="282">DEPLOY</text>
  </g>

  <!-- Floating particles -->
