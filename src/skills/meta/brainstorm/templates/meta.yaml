# Brainstorm session metadata. Schema-versioned from day one.
# On read: if schema_version is older, upgrade in place with defaults.
# On read: if schema_version is newer than coach expects, refuse to modify and preserve data.

schema_version: 1

# Session state
status: active             # active | paused | done | abandoned
position: "[A] — initial discovery"  # [A], [B:<move>] — <context>, [D], [P], [X]
topic: "<short human-readable topic>"
slug: "<kebab-case-topic-slug>"

# Classification (set in Phase A, may drift per coaching-policy)
type: ""                   # decision | exploratory | problem | creative | planning
shape: ""                  # Decision | Plan | Spec | Reframe | Decompose | Defer | Abandon | "" (pending)

# Persistence scope
scope: project             # project | global

# Timestamps
created: "YYYY-MM-DD"
last_updated: "YYYY-MM-DD"

# Optional cross-references
related_sessions: []       # list of other session slugs related to this one
related_skills: []         # list of skills surfaced as relevant during the session
follow_ups: []             # things flagged during the session that belong to a different skill or later work

# Pause/resume metadata (populated on Pause)
pause_reason: ""           # e.g., "diminishing returns on T5, T7"; "user requested"
open_threads_at_pause: []  # list of thread IDs still open when paused
